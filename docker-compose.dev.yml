# BrewBuddy - Development Docker Compose
# Use: docker compose -f docker-compose.dev.yml up -d

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: brewbuddy-frontend-dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/__tests__:/app/__tests__
      - ./frontend/vitest.config.ts:/app/vitest.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
    env_file:
      - .env
    environment:
      - VITE_API_URL=http://localhost:3001/api
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - brewbuddy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: brewbuddy-backend-dev
    ports:
      - "3001:3001"
    volumes:
      - ./backend/src:/app/src
      - ./backend/__tests__:/app/__tests__
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/brewbuddy
      - NODE_ENV=development
      - JWT_SECRET=dev-secret-change-in-production
      - JWT_EXPIRES_IN=7d
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - brewbuddy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  mongodb:
    image: mongo:8.0
    container_name: brewbuddy-mongodb-dev
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data_dev:/data/db
    networks:
      - brewbuddy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  mongodb_data_dev:
    driver: local

networks:
  brewbuddy-network:
    driver: bridge
